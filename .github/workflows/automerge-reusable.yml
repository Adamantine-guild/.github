name: Reusable Auto-merge and Close Issue

on:
  workflow_call:

jobs:
  automerge:
    if: github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  close-issue:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close linked issue
        run: |
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oiP '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\K\d+' | head -1)
          if [ -n "$ISSUE_NUM" ]; then
            echo "Closing issue #$ISSUE_NUM"
            gh issue close "$ISSUE_NUM" --repo "$GITHUB_REPOSITORY"
          else
            echo "No closing keyword found in PR body"
          fi
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
